<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEMON HUB - Script Distribution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Kanit', sans-serif; }
        .script-card { background: #1a1a1a; border: 1px solid #333; transition: 0.3s; }
        .script-card:hover { border-color: #00ff00; transform: translateY(-5px); }
        .glass-nav { background: rgba(26, 26, 26, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <nav class="glass-nav sticky top-0 z-50 p-4 border-b border-gray-800">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-green-500">ZEMON <span class="text-white">HUB</span></h1>
            <div class="space-x-4">
                <a href="#" class="hover:text-green-500">Home</a>
                <a href="/admin" class="bg-green-600 px-4 py-2 rounded-lg text-sm">Dashboard</a>
            </div>
        </div>
    </nav>

    <header class="py-16 text-center">
        <h2 class="text-4xl font-extrabold mb-4">แจกฟรีสคริปต์ ROBLOX</h2>
        <p class="text-gray-400">รวบรวมสคริปต์ที่ดีที่สุดโดย ซีม่อน</p>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <div id="script-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        // ฟังก์ชันจำลองการดึงข้อมูลจากหลังบ้าน
        async function loadScripts() {
            try {
                const response = await fetch('/api/scripts');
                const scripts = await response.json();
                const container = document.getElementById('script-container');
                
                container.innerHTML = scripts.map(item => `
                    <div class="script-card rounded-xl overflow-hidden shadow-lg">
                        <img src="${item.image}" alt="${item.name}" class="w-full h-48 object-cover">
                        <div class="p-5">
                            <h3 class="text-xl font-bold mb-2">${item.name}</h3>
                            <div class="bg-black p-3 rounded flex justify-between items-center">
                                <code class="text-xs text-green-400 truncate mr-2">${item.code}</code>
                                <button onclick="copyCode('${item.code}')" class="text-white hover:text-green-500">
                                    <i class="fas fa-copy"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.log("ยังไม่มีข้อมูลสคริปต์ หรือยังไม่ได้เชื่อม API");
            }
        }

        function copyCode(text) {
            navigator.clipboard.writeText(text);
            alert('คัดลอกสคริปต์แล้วนะค้าบซีม่อน!');
        }

        window.onload = loadScripts;
    </script>
</body>
</html>
